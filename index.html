<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=aicook" />
    <link rel="apple-touch-icon" href="/app-icon.png?v=aicook" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>あいくっく</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      const resetVersion = 'aicook-reset-d28bc76-v3'
      const params = new URLSearchParams(window.location.search)

      if (params.get('reset') !== resetVersion) {
        try {
          localStorage.clear()
          sessionStorage.clear()

          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations()
            await Promise.all(registrations.map((registration) => registration.unregister()))
          }

          if ('caches' in window) {
            const keys = await caches.keys()
            await Promise.all(keys.map((key) => caches.delete(key)))
          }
        } finally {
          window.location.replace(`${window.location.pathname}?reset=${resetVersion}&t=${Date.now()}`)
        }
      } else {
        await import('/src/main.tsx?build=d28bc76-v3')
      }
    </script>
  </body>
</html>
